<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objects — Archive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #000;
      background: #fff;
      padding: 20px;
    }

    #layout {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    a {
      color: #00e;
      text-decoration: underline;
    }

    a:visited {
      color: #551a8b;
    }

    a:hover {
      color: #f00;
    }

    hr {
      border: none;
      border-top: 1px solid #000;
      margin: 12px 0;
    }

    /* Nav */
    #nav {
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 100px;
      position: sticky;
      top: 20px;
      align-self: flex-start;
    }

    #nav a {
      display: block;
    }

    #nav a.active {
      text-decoration: none;
      color: #000;
      cursor: default;
    }

    /* Main content */
    #content {
      flex: 1;
      max-width: 800px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .grid-item a {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .grid-item img {
      width: 100%;
      display: block;
      border: none;
    }

    .grid-item .meta {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      margin-bottom: 16px;
    }

    .grid-item .price {
      color: #000;
    }

    .grid-item .sold {
      color: #bbb;
      text-decoration: line-through;
    }

    /* Footer */
    #footer {
      margin-top: 40px;
      font-size: 12px;
      color: #555;
    }

    /* Topbar */
    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      color: #888;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }
    #topbar a {
      font-size: 11px;
      color: #00e;
      text-decoration: underline;
    }
    #topbar a:visited {
      color: #551a8b;
    }
  </style>
</head>
<body>
  <!-- TOPBAR -->
  <div id="topbar">
    <span id="time-on-earth">spawn time on earth: calculating...</span>
    <span>reach out &nbsp;&nbsp;<a href="https://instagram.com/d.hamanjo" target="_blank">instagram // @d.hamanjo</a></span>
  </div>

  <hr>

  <script>
    const BIRTH = new Date(2001, 8, 3);
    function update() {
      const now = new Date();
      const diff = now - BIRTH;
      const s = Math.floor(diff / 1000);
      const sec = s % 60;
      const m = Math.floor(s / 60);
      const min = m % 60;
      const h = Math.floor(m / 60);
      const hrs = h % 24;
      const totalDays = Math.floor(h / 24);
      const years = Math.floor(totalDays / 365.25);
      const days = Math.floor(totalDays % 365.25);
      document.getElementById("time-on-earth").textContent =
        "spawn time on earth: " + years + "y " + days + "d " +
        String(hrs).padStart(2,"0") + "h " +
        String(min).padStart(2,"0") + "m " +
        String(sec).padStart(2,"0") + "s";
    }
    update();
    setInterval(update, 1000);
  </script>

  <div id="layout">

    <div id="nav">
      <a href="index.html">Objects</a>
      <a href="chronology.html">Chronology</a>
      <a href="lectures.html">Lectures</a>
      <a href="trash.html" style="color:#bbb;text-decoration:line-through;pointer-events:auto;">Trash</a>
    </div>

    <div id="content">

      <div class="grid">

        <div class="grid-item">
          <a href="entry.html">
            <img src="painting-01.jpg" alt="Untitled No. 1">
            <div class="meta">painting &nbsp;·&nbsp; <span class="price">£ 400</span></div>
          </a>
        </div>

        <div class="grid-item">
          <a href="entry-sketch-01.html">
            <img src="sketch-01.jpg" alt="Sketch on receipt">
            <div class="meta">sketch &nbsp;·&nbsp; <span class="price">£ 80</span></div>
          </a>
        </div>

        <div class="grid-item">
          <a href="entry-object-01.html">
            <img src="object-01.jpg" alt="Found object">
            <div class="meta">object &nbsp;·&nbsp; <span class="sold">£ 120</span></div>
          </a>
        </div>

        <div class="grid-item">
          <a href="entry-sketch-02.html">
            <img src="sketch-02.jpg" alt="Figure study">
            <div class="meta">sketch &nbsp;·&nbsp; <span class="price">£ 60</span></div>
          </a>
        </div>

        <!-- add more items here following the same pattern -->

      </div>

    </div> <!-- /content -->
  </div> <!-- /layout -->

  <hr>

  <div id="footer">
    &copy; 2026 Your Name &nbsp;·&nbsp; All rights reserved
  </div>

</body>
</html>
